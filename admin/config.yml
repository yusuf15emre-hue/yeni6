backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:

  # ── SITE SETTINGS ──
  - name: "settings"
    label: "⚙ Site Settings"
    files:
      - name: "general"
        label: "General"
        file: "_data/settings.json"
        fields:
          - { label: "WhatsApp Number", name: "whatsapp", widget: "string", hint: "International format, no spaces or +. Example: 905001234567" }
          - { label: "Email Address", name: "email", widget: "string" }
          - { label: "Instagram URL", name: "instagram", widget: "string" }
          - { label: "TikTok URL", name: "tiktok", widget: "string" }
          - { label: "Hero Image", name: "hero_image", widget: "image", required: false, hint: "Main image shown on the right side of the hero section" }

  # ── PACKAGES ──
  - name: "packages"
    label: "📦 Packages"
    files:
      - name: "packages"
        label: "All Packages"
        file: "_data/packages.json"
        fields:
          - label: "Packages"
            name: "packages"
            widget: "list"
            fields:
              - { label: "Package Name", name: "name", widget: "string", hint: "e.g. Essential, Premium VIP" }
              - { label: "Currency Symbol", name: "currency", widget: "string", default: "£" }
              - { label: "Price", name: "price", widget: "string", hint: "e.g. 2,500" }
              - { label: "Period / Subtitle", name: "period", widget: "string", default: "per person · all-inclusive" }
              - { label: "Featured (Most Popular)", name: "featured", widget: "boolean", default: false }
              - label: "What's Included"
                name: "includes"
                widget: "list"
                field: { label: "Item", name: "item", widget: "string" }

  # ── BEFORE/AFTER RESULTS ──
  - name: "results"
    label: "📷 Before/After Results"
    files:
      - name: "results"
        label: "Patient Results"
        file: "_data/results.json"
        fields:
          - label: "Results"
            name: "results"
            widget: "list"
            fields:
              - { label: "Before Image", name: "before", widget: "image", required: false }
              - { label: "After Image", name: "after", widget: "image", required: false }
              - { label: "Grafts Count", name: "grafts", widget: "string", required: false, hint: "e.g. 3,200" }
              - { label: "Technique", name: "technique", widget: "string", required: false, hint: "e.g. FUE Sapphire" }
              - { label: "Months After Surgery", name: "months", widget: "string", default: "12" }

  # ── JOURNAL ARTICLES ──
  - name: "articles"
    label: "📝 Journal Articles"
    files:
      - name: "articles"
        label: "All Articles"
        file: "_data/articles.json"
        fields:
          - label: "Articles"
            name: "articles"
            widget: "list"
            fields:
              - { label: "Tag / Category", name: "tag", widget: "string", hint: "e.g. Complete Guide, Recovery, Planning" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Description", name: "desc", widget: "text" }
              - { label: "Link URL", name: "url", widget: "string", default: "/blog" }
              - { label: "Cover Image", name: "image", widget: "image", required: false }

  # ── FAQ ──
  - name: "faq"
    label: "❓ FAQ"
    files:
      - name: "faq"
        label: "Frequently Asked Questions"
        file: "_data/faq.json"
        fields:
          - label: "Questions"
            name: "faq"
            widget: "list"
            fields:
              - { label: "Question", name: "question", widget: "string" }
              - { label: "Answer", name: "answer", widget: "text" }
